<!doctype html>
<html lang="en">

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>CloudWest | AI Agents for Back-Office Automation — Insurance, Healthcare, Government</title>
    <meta name="description" content="CloudWest builds AI agents that automate back-office work for small businesses. Purpose-built for insurance, healthcare, government, and real estate. Fixed-price founder plans available." />

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cloudwest.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cloudwest.ai/" />
    <meta property="og:title" content="CloudWest | AI Agents That Automate Back-Office Work" />
    <meta property="og:description" content="Intelligent AI agents for insurance, healthcare, government, and real estate. Automate claims, billing, compliance, and document review." />
    <meta property="og:site_name" content="CloudWest" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cloudwest.ai/" />
    <meta name="twitter:title" content="CloudWest | AI Agents That Automate Back-Office Work" />
    <meta name="twitter:description" content="Intelligent AI agents for insurance, healthcare, government, and real estate. Automate claims, billing, compliance, and document review." />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CloudWest",
      "url": "https://cloudwest.ai",
      "description": "AI-first consulting firm building intelligent agents that automate back-office work for small businesses across insurance, healthcare, government, and real estate.",

      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "url": "https://cloudwest.ai/#contact"
      }
    }
    </script>

    <!-- Structured Data - WebSite (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CloudWest",
      "url": "https://cloudwest.ai"
    }
    </script>
